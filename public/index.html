<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS2 Singapore Server Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div>
          <p class="eyebrow">Realtime tracker</p>
          <h1>CS2 Singapore server tracker</h1>
          <p class="sub">Refreshing every 10 seconds. The site prefers direct server queries for live player counts and names, then falls back to the public hvh.wtf feed if direct queries fail.</p>
        </div>
        <button id="refreshBtn">Refresh now</button>
      </header>

      <section class="meta">
        <div class="meta-card">
          <span class="label">Last refresh</span>
          <strong id="refreshedAt">Waiting...</strong>
        </div>
        <div class="meta-card">
          <span class="label">Players online</span>
          <strong id="playersOnline">0</strong>
        </div>
        <div class="meta-card">
          <span class="label">Tracked servers</span>
          <strong id="trackedCount">3</strong>
        </div>
      </section>

      <section id="status" class="status">Loading server data...</section>
      <section id="serverGrid" class="grid"></section>
    </main>

    <script>
      const refreshBtn = document.getElementById('refreshBtn');
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('serverGrid');
      const refreshedAtEl = document.getElementById('refreshedAt');
      const playersOnlineEl = document.getElementById('playersOnline');
      const trackedCountEl = document.getElementById('trackedCount');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function loadServers() {
        statusEl.textContent = 'Refreshing...';
        try {
          const response = await fetch('/api/servers', { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Request failed');
          }
          const data = await response.json();
          render(data);
          statusEl.textContent = 'Live data loaded.';
        } catch (error) {
          statusEl.textContent = 'Could not load live data right now.';
          console.error(error);
        }
      }

      function render(data) {
        refreshedAtEl.textContent = new Date(data.refreshedAt).toLocaleString();
        trackedCountEl.textContent = data.totalTracked;

        const totalPlayers = data.servers.reduce((sum, server) => sum + (server.playersNow || 0), 0);
        playersOnlineEl.textContent = totalPlayers;

        gridEl.innerHTML = '';
        data.servers.forEach((server) => {
          const card = document.createElement('article');
          card.className = 'card';
          const occupancy = server.maxPlayers ? `${server.playersNow}/${server.maxPlayers}` : 'Unknown';
          const onlineClass = server.online ? 'online' : 'offline';
          const sourceClass = server.liveQueryOk ? 'source-direct' : 'source-feed';
          const playerList = (server.livePlayerNames || []).length
            ? `<ul class="player-list">${server.livePlayerNames.map((player) => `
                <li>
                  <span class="player-name">${escapeHtml(player.name || '(unnamed player)')}</span>
                  <span class="player-meta">${Math.round(player.durationSeconds || 0)}s</span>
                </li>
              `).join('')}</ul>`
            : `<p class="empty-players">${server.liveQueryOk ? 'No players in server right now.' : 'Direct player query unavailable right now.'}</p>`;

          card.innerHTML = `
            <div class="card-top">
              <span class="pill ${onlineClass}">${server.online ? 'Online' : 'Offline'}</span>
              <span class="address">${escapeHtml(server.address)}</span>
            </div>
            <h2>${escapeHtml(server.name)}</h2>
            <div class="stats">
              <div>
                <span class="label">Players</span>
                <strong>${occupancy}</strong>
              </div>
              <div>
                <span class="label">Map</span>
                <strong>${escapeHtml(server.map || 'Unknown')}</strong>
              </div>
              <div>
                <span class="label">Region</span>
                <strong>${escapeHtml(server.country || server.region || 'Unknown')}</strong>
              </div>
            </div>
            <div class="card-actions">
              <button class="copy-btn" data-address="${escapeHtml(server.address)}">Copy IP</button>
              <span class="source-badge ${sourceClass}">${server.liveQueryOk ? 'Direct live query' : 'Feed fallback'}</span>
            </div>
            <div class="players-panel">
              <div class="players-header">
                <span class="label">Live player names</span>
                <strong>${server.livePlayerNames?.length || 0}</strong>
              </div>
              ${playerList}
            </div>
            <p class="tags">${(server.tags || []).map(escapeHtml).join(' · ') || 'No tags'}</p>
          `;

          const copyBtn = card.querySelector('.copy-btn');
          copyBtn.addEventListener('click', async () => {
            try {
              await navigator.clipboard.writeText(server.address);
              copyBtn.textContent = 'Copied';
              setTimeout(() => {
                copyBtn.textContent = 'Copy IP';
              }, 1200);
            } catch (error) {
              copyBtn.textContent = 'Copy failed';
              setTimeout(() => {
                copyBtn.textContent = 'Copy IP';
              }, 1200);
            }
          });

          gridEl.appendChild(card);
        });
      }

      refreshBtn.addEventListener('click', loadServers);
      loadServers();
      setInterval(loadServers, 10000);
    </script>
  </body>
</html>
